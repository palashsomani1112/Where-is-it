<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a1a2e">
<title>Where Is It?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e17;
    --bg2: #1a1929;
    --bg3: #23223a;
    --card: #1e1d30;
    --accent: #e8c468;
    --accent2: #a78bfa;
    --text: #f0eef8;
    --muted: #8b89a8;
    --border: rgba(255,255,255,0.08);
    --danger: #f87171;
    --success: #6ee7b7;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  body { display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); letter-spacing: -0.3px; }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  nav {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 12px 0; cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s; letter-spacing: 0.2px;
  }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { flex: 1; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }

  .tab { display: none; }
  .tab.active { display: block; }

  /* FIND TAB */
  .search-wrap { position: relative; margin-bottom: 24px; }
  .search-wrap input {
    width: 100%; padding: 14px 50px 14px 18px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 16px;
    outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: var(--accent); border: none; border-radius: 8px;
    width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .search-btn:active { background: #d4a84e; }
  .search-btn svg { width: 18px; height: 18px; stroke: #0f0e17; fill: none; stroke-width: 2.5; }

  .result-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    animation: slideIn 0.25s ease;
  }
  .result-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; }
  .result-item { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); margin-bottom: 12px; }
  .result-arrow { color: var(--muted); font-size: 13px; margin-bottom: 4px; }
  .result-place {
    font-size: 20px; font-weight: 600; color: var(--accent);
    background: rgba(232,196,104,0.1); padding: 10px 16px;
    border-radius: var(--radius-sm); border: 1px solid rgba(232,196,104,0.2);
  }
  .result-place::before { content: '📍 '; }

  .no-result {
    text-align: center; padding: 40px 20px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .no-result .icon { font-size: 40px; margin-bottom: 12px; }
  .no-result p { color: var(--muted); font-size: 14px; }
  .no-result strong { color: var(--text); }

  .suggestions {
    margin-top: 12px;
  }
  .suggestion-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 13px;
    cursor: pointer; transition: all 0.15s; color: var(--text);
  }
  .chip:active { background: var(--accent2); color: #fff; transform: scale(0.96); }

  /* ADD / MANAGE TAB */
  .section-title {
    font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
  }

  .add-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 24px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.3px; }
  .form-row input {
    width: 100%; padding: 12px 16px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus { border-color: var(--accent2); }
  .form-row input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%; padding: 13px; background: var(--accent);
    border: none; border-radius: var(--radius-sm);
    color: #0f0e17; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.2px;
  }
  .btn-primary:active { transform: scale(0.98); background: #d4a84e; }

  .items-list { display: flex; flex-direction: column; gap: 10px; }

  .item-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    animation: slideIn 0.2s ease;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-weight: 500; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-place { font-size: 13px; color: var(--accent); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-place::before { content: '→ '; color: var(--muted); }

  .item-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-icon {
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg3);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-icon:active { transform: scale(0.92); }
  .btn-edit:active { background: rgba(167,139,250,0.2); border-color: var(--accent2); }
  .btn-delete:active { background: rgba(248,113,113,0.15); border-color: var(--danger); }
  .btn-icon svg { width: 16px; height: 16px; fill: none; stroke-width: 2; }
  .btn-edit svg { stroke: var(--accent2); }
  .btn-delete svg { stroke: var(--danger); }

  .empty-state {
    text-align: center; padding: 50px 20px; color: var(--muted);
  }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px 36px; width: 100%; max-width: 500px;
    transform: translateY(30px); transition: transform 0.3s ease;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 18px; color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-secondary {
    flex: 1; padding: 12px; background: transparent;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:active { background: var(--bg3); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg3); border: 1px solid var(--border);
    padding: 12px 24px; border-radius: 100px;
    font-size: 14px; color: var(--text); z-index: 300;
    transition: transform 0.3s ease; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .count-badge {
    background: var(--accent2); color: #fff;
    font-size: 11px; font-weight: 600;
    border-radius: 10px; padding: 1px 7px; margin-left: 6px;
  }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .search-live { margin-top: 4px; }
  .search-live .item-row { animation: none; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .filter-input {
    flex: 1; padding: 9px 14px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  }
  .filter-input::placeholder { color: var(--muted); }
  .filter-input:focus { border-color: var(--accent2); }
</style>
</head>
<body>

<header>
  <h1>Where Is It? 🏠</h1>
  <p>Your home item locator</p>
</header>

<nav>
  <button class="active" onclick="switchTab('find')">🔍 Find Item</button>
  <button onclick="switchTab('manage')">📦 My Items <span class="count-badge" id="count-badge">0</span></button>
</nav>

<main>
  <!-- FIND TAB -->
  <div id="tab-find" class="tab active">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="What are you looking for?" autocomplete="off"
        oninput="liveSearch()" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div id="find-result"></div>
    <div id="live-results" class="search-live"></div>
    <div id="recent-chips"></div>
  </div>

  <!-- MANAGE TAB -->
  <div id="tab-manage" class="tab">
    <div class="add-form">
      <p class="section-title">Add New Item</p>
      <div class="form-row">
        <label>Item name</label>
        <input type="text" id="new-item" placeholder="e.g. Passport, Scissors, Charger…" autocomplete="off">
      </div>
      <div class="form-row">
        <label>Location in your home</label>
        <input type="text" id="new-place" placeholder="e.g. Kitchen drawer, Wardrobe shelf…" autocomplete="off">
      </div>
      <button class="btn-primary" onclick="addItem()">＋ Save Item</button>
    </div>

    <p class="section-title">Saved Items</p>
    <div class="filter-bar">
      <input class="filter-input" type="text" id="filter-input" placeholder="Filter items…" oninput="renderList()">
    </div>
    <div id="items-list" class="items-list"></div>
  </div>
</main>

<!-- Edit Modal -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h2>Edit Item</h2>
    <div class="form-row">
      <label>Item name</label>
      <input type="text" id="edit-item-name" placeholder="Item name">
    </div>
    <div class="form-row">
      <label>Location</label>
      <input type="text" id="edit-item-place" placeholder="Location">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1.5" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-backdrop" id="delete-modal">
  <div class="modal">
    <h2>Delete Item?</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:4px;">This will permanently remove:</p>
    <p style="font-weight:600;font-size:16px;margin:10px 0;" id="delete-item-name"></p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1.2;background:var(--danger);color:#fff" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_KEY = 'whereIsIt_v1';
let editId = null;
let deleteId = null;

function getItems() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }
  catch { return []; }
}

function saveItems(items) {
  localStorage.setItem(DB_KEY, JSON.stringify(items));
  updateBadge();
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function updateBadge() {
  document.getElementById('count-badge').textContent = getItems().length;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'manage') renderList();
  if (name === 'find') renderRecentChips();
}

function addItem() {
  const nameEl = document.getElementById('new-item');
  const placeEl = document.getElementById('new-place');
  const name = nameEl.value.trim();
  const place = placeEl.value.trim();
  if (!name || !place) { showToast('Please fill in both fields'); return; }

  const items = getItems();
  const existing = items.findIndex(i => i.name.toLowerCase() === name.toLowerCase());
  if (existing >= 0) {
    items[existing].place = place;
    items[existing].updated = Date.now();
    saveItems(items);
    showToast('Updated location for "' + name + '"');
  } else {
    items.push({ id: generateId(), name, place, created: Date.now() });
    saveItems(items);
    showToast('Saved! "' + name + '" is in ' + place);
  }
  nameEl.value = ''; placeEl.value = '';
  renderList();
}

function renderList() {
  const filter = (document.getElementById('filter-input')?.value || '').toLowerCase();
  const items = getItems().filter(i =>
    !filter || i.name.toLowerCase().includes(filter) || i.place.toLowerCase().includes(filter)
  );
  const el = document.getElementById('items-list');

  if (!items.length && !filter) {
    el.innerHTML = '<div class="empty-state"><div class="big">📦</div><p>No items saved yet.<br>Add your first item above!</p></div>';
    return;
  }
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="big">🔎</div><p>No items match your filter.</p></div>';
    return;
  }

  el.innerHTML = items.map(i => `
    <div class="item-row">
      <div class="item-info">
        <div class="item-name">${escHtml(i.name)}</div>
        <div class="item-place">${escHtml(i.place)}</div>
      </div>
      <div class="item-actions">
        <button class="btn-icon btn-edit" onclick="openEdit('${i.id}')" aria-label="Edit">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon btn-delete" onclick="openDelete('${i.id}')" aria-label="Delete">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function openEdit(id) {
  const item = getItems().find(i => i.id === id);
  if (!item) return;
  editId = id;
  document.getElementById('edit-item-name').value = item.name;
  document.getElementById('edit-item-place').value = item.place;
  document.getElementById('edit-modal').classList.add('open');
}

function saveEdit() {
  const name = document.getElementById('edit-item-name').value.trim();
  const place = document.getElementById('edit-item-place').value.trim();
  if (!name || !place) { showToast('Both fields required'); return; }
  const items = getItems();
  const idx = items.findIndex(i => i.id === editId);
  if (idx >= 0) { items[idx].name = name; items[idx].place = place; items[idx].updated = Date.now(); }
  saveItems(items);
  closeModal();
  renderList();
  showToast('Changes saved!');
}

function openDelete(id) {
  const item = getItems().find(i => i.id === id);
  if (!item) return;
  deleteId = id;
  document.getElementById('delete-item-name').textContent = '"' + item.name + '"';
  document.getElementById('delete-modal').classList.add('open');
}

function confirmDelete() {
  const items = getItems().filter(i => i.id !== deleteId);
  saveItems(items);
  closeModal();
  renderList();
  showToast('Item deleted');
}

function closeModal() {
  document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('open'));
  editId = null; deleteId = null;
}

document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
});

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) return;
  const items = getItems();
  const found = items.filter(i => i.name.toLowerCase().includes(q));
  const el = document.getElementById('find-result');
  document.getElementById('live-results').innerHTML = '';

  if (found.length === 1) {
    el.innerHTML = `<div class="result-card">
      <div class="result-label">Found it!</div>
      <div class="result-item">${escHtml(found[0].name)}</div>
      <div class="result-arrow">is located in</div>
      <div class="result-place">${escHtml(found[0].place)}</div>
    </div>`;
  } else if (found.length > 1) {
    el.innerHTML = `<div class="result-card">
      <div class="result-label">${found.length} matches found</div>
      ${found.map(i => `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="font-weight:500;color:var(--text)">${escHtml(i.name)}</div>
        <div class="item-place" style="font-size:14px;color:var(--accent)">${escHtml(i.place)}</div>
      </div>`).join('')}
    </div>`;
  } else {
    el.innerHTML = `<div class="no-result">
      <div class="icon">🤷</div>
      <p>Can't find <strong>"${escHtml(q)}"</strong><br>Try adding it in My Items first!</p>
    </div>`;
  }
}

function liveSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('find-result').innerHTML = '';
  const liveEl = document.getElementById('live-results');
  if (!q || q.length < 2) { liveEl.innerHTML = ''; renderRecentChips(); return; }
  document.getElementById('recent-chips').innerHTML = '';

  const items = getItems().filter(i => i.name.toLowerCase().includes(q) || i.place.toLowerCase().includes(q));
  if (!items.length) { liveEl.innerHTML = ''; return; }
  liveEl.innerHTML = items.slice(0,5).map(i => `
    <div class="item-row" onclick="selectItem('${escHtml(i.name).replace(/'/g,"\\'")}')">
      <div class="item-info">
        <div class="item-name">${highlight(i.name, q)}</div>
        <div class="item-place">${escHtml(i.place)}</div>
      </div>
    </div>`).join('');
}

function selectItem(name) {
  document.getElementById('search-input').value = name;
  document.getElementById('live-results').innerHTML = '';
  doSearch();
}

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return escHtml(text);
  return escHtml(text.slice(0, idx)) +
    '<mark style="background:rgba(232,196,104,0.25);color:var(--accent);border-radius:3px;">' +
    escHtml(text.slice(idx, idx + q.length)) + '</mark>' +
    escHtml(text.slice(idx + q.length));
}

function renderRecentChips() {
  const items = getItems();
  const el = document.getElementById('recent-chips');
  if (!items.length) { el.innerHTML = ''; return; }
  const recent = [...items].sort((a,b) => (b.updated||b.created) - (a.updated||a.created)).slice(0,6);
  el.innerHTML = `<p class="suggestion-label" style="font-size:12px;color:var(--muted);margin-bottom:8px">Recently saved</p>
    <div class="suggestion-chips">${recent.map(i =>
      `<button class="chip" onclick="selectItem('${escHtml(i.name).replace(/'/g,"\\'")}')">
        ${escHtml(i.name)}</button>`).join('')}</div>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('new-place').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('new-item').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('new-place').focus(); });

updateBadge();
renderRecentChips();
</script>
</body>
</html>
